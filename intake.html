<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intake Form</title>
    <script>
        function toggleLanguage() {
            const currentLang = localStorage.getItem('language') || 'en';
            const newLang = currentLang === 'en' ? 'es' : 'en';
            localStorage.setItem('language', newLang);
            updateLanguage();
        }

        function updateLanguage() {
            const lang = localStorage.getItem('language') || 'en';
            const elements = document.querySelectorAll('[data-lang]');
            elements.forEach((element) => {
                const langKey = `${lang}_${element.getAttribute('data-lang')}`;
                element.textContent = translations[langKey];
                if (element.tagName === 'INPUT') {
                    element.placeholder = translations[`${lang}_placeholder`];
                }
            });
        }

        const translations = {
            'en_label_case_type': 'Case Type',
            'en_label_name': 'Your Name',
            'en_label_email': 'Your Email',
            'en_placeholder_name': 'Enter your name',
            'en_placeholder_email': 'Enter your email',
            'es_label_case_type': 'Tipo de Caso',
            'es_label_name': 'Tu Nombre',
            'es_label_email': 'Tu Correo Electrónico',
            'es_placeholder_name': 'Ingresa tu nombre',
            'es_placeholder_email': 'Ingresa tu correo electrónico',
        };

        document.addEventListener('DOMContentLoaded', updateLanguage);
    </script>
</head>
<body>
    <button onclick="toggleLanguage()">Toggle Language</button>
    <form>
        <label data-lang="label_case_type"></label>
        <select>
            <option value="type1">Type 1</option>
            <option value="type2">Type 2</option>
        </select>
        <br>
        <label data-lang="label_name"></label>
        <input type="text" data-lang="label_name">
        <br>
        <label data-lang="label_email"></label>
        <input type="email" data-lang="label_email">
        <br>
        <input type="submit" value="Submit">
    </form>
</body>
</html>
